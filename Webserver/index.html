<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nullstellenrechner</title>
    <style>
        :root {
            --bg: linear-gradient(135deg, #f6efe7, #dce8f2);
            --card: rgba(255, 255, 255, 0.88);
            --text: #1f2933;
            --accent: #d97706;
            --accent-dark: #9a3412;
            --border: rgba(31, 41, 51, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .card {
            width: min(100%, 560px);
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 18px 45px rgba(31, 41, 51, 0.15);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: clamp(2rem, 4vw, 2.6rem);
        }

        p {
            margin-top: 0;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        form {
            display: grid;
            gap: 16px;
        }

        label {
            display: grid;
            gap: 6px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 1rem;
        }

        button {
            border: 0;
            border-radius: 14px;
            padding: 14px 18px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }

        .result {
            margin-top: 24px;
            padding: 18px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid var(--border);
        }

        .result h2 {
            margin: 0 0 10px;
            font-size: 1.15rem;
        }

        .result p {
            margin: 0;
        }
    </style>
</head>
<body>
<main class="card">
    <h1>Nullstellenrechner</h1>
    <p>Gib die Koeffizienten der quadratischen Gleichung <strong>ax<sup>2</sup> + bx + c = 0</strong> ein.</p>

    <form id="zero-form">
        <label for="a">
            Koeffizient a
            <input id="a" name="a" type="number" step="any" value="1" required>
        </label>

        <label for="b">
            Koeffizient b
            <input id="b" name="b" type="number" step="any" value="-5" required>
        </label>

        <label for="c">
            Koeffizient c
            <input id="c" name="c" type="number" step="any" value="6" required>
        </label>

        <button type="submit">Nullstellen berechnen</button>
    </form>

    <section class="result" id="result">
        <h2>Ergebnis</h2>
        <p>Bereit zur Berechnung.</p>
    </section>
</main>

<script src="../Nullstellenrechner/Rechner.js"></script>
<script>
    const form = document.getElementById("zero-form");
    const resultBox = document.getElementById("result");

    function renderResult(text) {
        resultBox.innerHTML = "<h2>Ergebnis</h2><p>" + text + "</p>";
    }

    form.addEventListener("submit", function (event) {
        event.preventDefault();

        const a = Number(document.getElementById("a").value);
        const b = Number(document.getElementById("b").value);
        const c = Number(document.getElementById("c").value);

        const result = window.calculateZeros(a, b, c);

        if (!result) {
            renderResult("Bitte gib fuer a einen Wert ungleich 0 ein.");
            return;
        }

        if (result.zeros.length === 0) {
            renderResult(result.message);
            return;
        }

        const zeros = result.zeros.map(function (zero) {
            return Number(zero.toFixed(4));
        });

        renderResult(result.message + ": " + zeros.join(" und "));
    });
</script>
</body>
</html>
